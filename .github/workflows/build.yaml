name: Build, push, and deploy Docker images
on:
  push:
    branches:
      - "main"
jobs:
  push_to_registry:
    name: Build and push Docker images to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose -f compose.prod.yaml build

      - name: Push images
        run: docker compose -f compose.prod.yaml push

  deploy:
    name: Deploy to production via SSH
    runs-on: ubuntu-latest
    needs: push_to_registry
    environment: 
      name: production
      url: https://kvak.idebate.net
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Install podman-compose
        run: sudo apt-get update && sudo apt-get install -y podman-compose

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null "${{ github.workspace }}/.ssh/id_ed25519"
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > "${{ github.workspace }}/.ssh/id_ed25519"

      - name: Write .env file
        run: |
          cat > .env <<'EOF'
          PERSISTENT_DATA_DIR=${{ vars.PERSISTENT_DATA_DIR }}
          POSTGRES_DB_PASSWORD=${{ secrets.POSTGRES_DB_PASSWORD }}
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          EOF

      - name: Pull and redeploy
        env:
          PODMAN_COMPOSE_PROVIDER: podman-compose
          CONTAINER_HOST: ssh://${{ vars.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}/run/user/${{ vars.DEPLOY_SSH_UID }}/podman/podman.sock
          CONTAINER_SSHKEY: ${{ github.workspace }}/.ssh/id_ed25519
        run: |
          podman compose -f compose.prod.yaml up -d --remove-orphans --pull always
